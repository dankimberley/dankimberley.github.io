<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
          integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk"
          crossorigin="anonymous">


    <style>
        body {
            background-image: url("images/welcome_background_new.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;

        }

        .center_content {
            margin: 0;
            position: absolute;
            top: 45%;
            left: 50%;
            -ms-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            text-align: center;
        }


        @media screen and (max-width: 600px) {
            .center_content {
                margin: 0;
                position: absolute;
                top: 45%;
                width:100%;

            }

            .small_width, .year, .value {
                width: 100% !important;
            }

            .btn {
                margin-bottom: 10px;
            }


        }


        .weight {
            width: 48%;
            float: left;
        }

        .reps {
            width: 48%;
            float: right;
        }

        .results {
            background-color: white;
            opacity: 75%;
            border-radius: 5px;
            text-align: center;
            transition: 0.3s;
            font-weight: bold;
        }

        .results:hover {
            opacity: 85%;
        }


    </style>

    <script src="js/max_calculator.js"></script>

    <title>1RM Calculator</title>
</head>
<body>


<div class="center_content small_width">
    <h1 style="text-align:center;">1RM Calculator</h1>
    <div class="input-group mb-3 weight">
        <div class="btn-group btn-group-toggle" data-toggle="buttons">
            <label class="btn btn-secondary active">
                <input type="radio" onclick="get_maxes()" name="unit" id="option1" value="kg" checked> kg
            </label>
            <label class="btn btn-secondary">
                <input type="radio" onclick="get_maxes()" name="unit" id="option2" value="lbs"> lbs
            </label>
        </div>
        <input type="text" onkeyup="get_maxes()" id="weight" class="form-control" placeholder=""
               aria-label="Example text with two button addons" aria-describedby="button-addon3">
    </div>
    <div class="input-group mb-3 reps">
        <div class="input-group-prepend">
            <span class="input-group-text" id="inputGroup-sizing-default">Reps</span>
        </div>
        <input type="text" onkeyup="get_maxes()" id="reps" class="form-control" aria-label="Sizing example input"
               aria-describedby="inputGroup-sizing-default">
    </div>
    <br><br>

    <div class="results">
        <label id="Epley">Epley:</label><br>
        <label id="Brzycki">Brzycki:</label><br>
        <label id="McGlothin">McGlothin:</label><br>
        <label id="Average" style="font-weight:bolder;">Average:</label><br>

        <a style="font-weight:lighter; font-size: small;" href="https://en.wikipedia.org/wiki/One-repetition_maximum">More
            about the formulas</a>
        <br>

        <a href="https://www.dankimberley.com" class="btn btn-dark btn-sm">Back to dankimberley.com</a><br>
    </div>


</div>


<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
        integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
        crossorigin="anonymous"></script>

</body>
</html>
